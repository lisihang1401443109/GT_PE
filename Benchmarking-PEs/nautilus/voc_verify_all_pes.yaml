apiVersion: batch/v1
kind: Job
metadata:
  name: voc-multi-pe-verify
  namespace: gp-engine-malof
  labels:
    app: grit-verify
    target: voc
spec:
  completions: 4
  parallelism: 4
  completionMode: Indexed
  template:
    metadata:
      labels:
        app: grit-verify
        target: voc
    spec:
      containers:
        - name: gpu-container
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "--- Starting Pascal-VOC Multi-PE Verification Pod ---"

              # Install git
              apt-get update && apt-get install -y git

              # Setup workspace in HOME
              cd ~
              rm -rf GT_PE

              # Clone repo using verified token URL
              echo "Cloning repository (branch: benchmark-voc)..."
              git clone --branch benchmark-voc https://${GITHUB_TOKEN}@github.com/lisihang1401443109/GT_PE.git GT_PE
              cd GT_PE/Benchmarking-PEs

              echo "Git Commit:"
              git rev-parse HEAD

              # Run dynamic setup script
              echo "Running dynamic environment setup script..."
              bash setup_environment.sh

              # Initialize conda
              source /opt/conda/etc/profile.d/conda.sh
              conda activate GTPE

              # Link datasets, pre-trained weights, and results
              echo "Linking PVC data..."
              mkdir -p datasets
              ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/ || true
              ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained . || true
              mkdir -p /mnt/pvc/GT_PE/Benchmarking-PEs/results
              rm -rf results && ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/results .

              # Map index to PE and WandB name
              if [ "$JOB_COMPLETION_INDEX" -eq 0 ]; then
                PE="GPSE"
                CFG="configs/GT/0_bench/GRITSparseConv/LRGB/VOC/voc-GRITSparse-GPSE.yaml"
              elif [ "$JOB_COMPLETION_INDEX" -eq 1 ]; then
                PE="LapPE"
                CFG="configs/GT/0_bench/GRITSparseConv/LRGB/VOC/voc-GRITSparse-LapPE.yaml"
              elif [ "$JOB_COMPLETION_INDEX" -eq 2 ]; then
                PE="RWSE"
                CFG="configs/GT/0_bench/GRITSparseConv/LRGB/VOC/voc-GRITSparse-RWSE.yaml"
              elif [ "$JOB_COMPLETION_INDEX" -eq 3 ]; then
                PE="noPE"
                CFG="configs/GT/0_bench/GRITSparseConv/LRGB/VOC/voc-GRITSparse-noPE.yaml"
              fi

              WANDB_NAME="Verify-VOC-$PE"
              EXTRA_ARGS="wandb.entity sihang-personal wandb.use True wandb.name $WANDB_NAME train.batch_size 16"

              if [ "$PE" == "GPSE" ]; then
                # Optimized for GPSE precomputation memory
                EXTRA_ARGS="$EXTRA_ARGS dataset.pe_transform_on_the_fly True posenc_GPSE.loader.batch_size 1 posenc_GPSE.model_dir /root/GT_PE/Benchmarking-PEs/pretrained/gpse_model_molpcba_1.0.pt"
              fi

              echo "Executing: $PE with WandB Name: $WANDB_NAME"

              LOG_DIR="/mnt/pvc/GT_PE/Benchmarking-PEs/logs"
              mkdir -p "$LOG_DIR"
              LOG_FILE="$LOG_DIR/verify_voc_${PE}.log"

              python main.py --cfg "$CFG" --repeat 1 $EXTRA_ARGS > "$LOG_FILE" 2>&1
          env:
            - name: WANDB_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wandb-api-key
                  key: WANDB_API_KEY
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: github-token
                  key: token
          resources:
            limits:
              nvidia.com/gpu: "1"
              memory: "32Gi"
              cpu: "8"
            requests:
              nvidia.com/gpu: "1"
              memory: "32Gi"
              cpu: "8"
          volumeMounts:
            - name: data-volume
              mountPath: "/mnt/pvc"
            - name: dshm
              mountPath: "/dev/shm"
      volumes:
        - name: data-volume
          persistentVolumeClaim:
            claimName: sihang-test-pvc
        - name: dshm
          emptyDir:
            medium: Memory
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - ry-gpu-08.sdsc.optiputer.net
                      - k8s-haosu-06.sdsc.optiputer.net
      restartPolicy: Never
      tolerations:
        - key: "nautilus.io/gp-engine-malof"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "PreferNoSchedule"
  backoffLimit: 3
