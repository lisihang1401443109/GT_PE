apiVersion: batch/v1
kind: Job
metadata:
  name: imdb-ablation-sparse-gpse
  namespace: gp-engine-malof
  labels:
    app: imdb-ablation
spec:
  template:
    metadata:
      labels:
        app: imdb-ablation
    spec:
      containers:
      - name: gpu-container
        image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
        command:
        - /bin/bash
        - -c
        args:
        - '# 1. git setup

          apt-get update && apt-get install -y git

          cd /root

          if [ ! -d "GT_PE" ]; then

          git clone https://github.com/lisihang1401443109/GT_PE.git

          fi

          cd GT_PE/Benchmarking-PEs

          # 2. git sync

          cd /root/GT_PE/Benchmarking-PEs

          git fetch origin

          git reset --hard origin/fix/imdb-eval-mask

          # 3. Setup Python Environment

          # We use the base environment since it already has torch 2.3.0 + CUDA 12.1
          correctly installed

          # Install dependencies

          pip install torch-geometric==2.6.1 yacs==0.1.8 wandb==0.26.1 ogb==1.3.6
          performer-pytorch==1.1.4 opt_einsum==3.4.0 attrdict pytorch-lightning

          pip install pyg_lib==0.4.0+pt23cu121 torch_scatter==2.1.2+pt23cu121 torch_sparse==0.6.18+pt23cu121
          torch_cluster==1.6.3+pt23cu121 torch_spline_conv==1.2.2+pt23cu121 -f https://data.pyg.org/whl/torch-2.3.0+cu121.html

          # 4. Setup Symlinks for Datasets, Pretrained Models, and Results

          mkdir -p datasets

          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/

          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained .

          rm -rf results

          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/results results

          # 5. RUN THE RIGHT COMMAND

          mkdir -p results/imdb-Sparse-GPSE/0/train/

          python main.py --cfg configs/GT/0_bench/GRIT/imdb_ablation/imdb-Sparse-GPSE.yaml
          --repeat 1 wandb.use True wandb.entity sihang-personal wandb.name IMDB-Ablation-Sparse-GPSE-Final
          posenc_GPSE.model_dir /root/GT_PE/Benchmarking-PEs/pretrained/gpse_model_molpcba_1.0.pt'
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: WANDB_API_KEY
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token
              key: token
        resources:
          limits:
            nvidia.com/gpu: '1'
            memory: 32Gi
            cpu: '8'
          requests:
            nvidia.com/gpu: '1'
            memory: 32Gi
            cpu: '8'
        volumeMounts:
        - name: data-volume
          mountPath: /mnt/pvc
        - name: dshm
          mountPath: /dev/shm
      restartPolicy: Never
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: sihang-test-pvc
      - name: dshm
        emptyDir:
          medium: Memory
      tolerations:
      - key: nautilus.io/gp-engine-malof
        operator: Exists
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: PreferNoSchedule
  backoffLimit: 0
