apiVersion: batch/v1
kind: Job
metadata:
  name: imdb-ablation-sparse-gpse
  namespace: gp-engine-malof
  labels:
    app: imdb-ablation
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: imdb-ablation
    spec:
      restartPolicy: Never
      containers:
      - name: gpu-container
        image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
        command:
        - /bin/bash
        - -c
        args:
        - "set -e\napt-get update && apt-get install -y git\n\n# 1. Clone repo\ncd\
          \ ~\nif [ ! -d \"GT_PE\" ]; then\n  git clone --branch fix/imdb-eval-mask\
          \ https://${GITHUB_TOKEN}@github.com/lisihang1401443109/GT_PE.git GT_PE\n\
          fi\ncd ~/GT_PE/Benchmarking-PEs\n\n# 2. Environment setup (creates GTPE\
          \ conda env)\nbash setup_environment.sh\n\n# 3. Symlink PVC assets\nmkdir\
          \ -p datasets\nln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/\
          \ || true\nln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained . || true\n\
          rm -rf results\nln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/results results\
          \ || true\n\n# 4. Pre-create result directory\nmkdir -p results/imdb-Sparse-GPSE/0/train/\n\
          \n# 5. Run using the GTPE conda env python directly (avoids conda activate\
          \ issues in non-interactive shells)\n/opt/conda/envs/GTPE/bin/python main.py\
          \ \\\n  --cfg configs/GT/0_bench/GRIT/imdb_ablation/imdb-Sparse-GPSE.yaml\
          \ \\\n  --repeat 1 \\\n  wandb.use True \\\n  wandb.entity sihang-personal\
          \ \\\n  wandb.name IMDB-Ablation-Sparse-GPSE-Final \\\n  posenc_GPSE.model_dir\
          \ pretrained/gpse_model_molpcba_1.0.pt\n"
        env:
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: WANDB_API_KEY
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token
              key: token
        resources:
          limits:
            nvidia.com/gpu: '1'
            memory: 32Gi
            cpu: '8'
          requests:
            nvidia.com/gpu: '1'
            memory: 32Gi
            cpu: '8'
        volumeMounts:
        - name: data-volume
          mountPath: /mnt/pvc
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: data-volume
        persistentVolumeClaim:
          claimName: sihang-test-pvc
      - name: dshm
        emptyDir:
          medium: Memory
      tolerations:
      - key: nautilus.io/gp-engine-malof
        operator: Exists
        effect: NoSchedule
      - key: nvidia.com/gpu
        operator: Exists
        effect: PreferNoSchedule
