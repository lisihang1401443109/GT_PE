apiVersion: batch/v1
kind: Job
metadata:
  labels:
    app: imdb-ablation
  name: imdb-ablation-sparse-gpse
  namespace: gp-engine-malof
spec:
  backoffLimit: 0
  template:
    spec:
      containers:
      - args:
        - 'apt-get update && apt-get install -y git wget bzip2 ca-certificates &&
          wget https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh
          -O miniconda.sh && bash miniconda.sh -b -p /opt/conda && export PATH="/opt/conda/bin:$PATH"
          && conda create -n GTPE python=3.9 -y && source /opt/conda/etc/profile.d/conda.sh
          && conda activate GTPE && pip install torch==2.1.0 torchvision==0.16.0 torchaudio==2.1.0
          --index-url https://download.pytorch.org/whl/cu121 && pip install torch_geometric
          && pip install pyg_lib torch_scatter torch_sparse torch_cluster torch_spline_conv
          -f https://data.pyg.org/whl/torch-2.1.0+cu121.html && pip install yacs wandb
          numpy pandas scikit-learn ogb performer-pytorch && # 1. git setup

          mkdir -p /root/GT_PE

          cd /root/GT_PE

          if [ ! -d "Benchmarking-PEs" ]; then

          git clone https://github.com/lisihang1401443109/GT_PE.git

          fi


          # 2. env setup

          source /opt/conda/etc/profile.d/conda.sh || true

          conda activate GTPE || true


          # 3. git sync

          cd /root/GT_PE/Benchmarking-PEs

          git fetch origin

          git reset --hard origin/fix/imdb-eval-mask


          # 4. symlinks and GPSE cache

          rm -rf datasets

          ln -s /mnt/pvc/GT_PE/Benchmarking-PEs/datasets datasets


          # 5. RUN THE RIGHT COMMAND

          python main.py --cfg configs/GT/0_bench/GRIT/imdb_ablation/imdb-Sparse-GPSE.yaml
          --repeat 1'
        command:
        - /bin/bash
        - -c
        image: nvidia/cuda:12.1.0-base-ubuntu22.04
        name: gpu-container
        resources:
          limits:
            cpu: '4'
            memory: 16Gi
            nvidia.com/gpu: '1'
          requests:
            cpu: '2'
            memory: 12Gi
            nvidia.com/gpu: '1'
        volumeMounts:
        - mountPath: /mnt/pvc
          name: gt-pe-volume
      restartPolicy: Never
      volumes:
      - name: gt-pe-volume
        persistentVolumeClaim:
          claimName: gt-pe-volume
