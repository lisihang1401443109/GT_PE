apiVersion: v1
kind: Pod
metadata:
  name: molpcba-debug-pod
  namespace: gp-engine-malof
spec:
  containers:
    - name: gpu-container
      image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
      command: [ "/bin/bash", "-c" ]
      args:
        - |
          set -e
          apt-get update && apt-get install -y git

          # Clone repo
          cd ~
          rm -rf GT_PE
          echo "Cloning repository (branch: benchmark_pe_gpse)..."
          git clone --branch benchmark_pe_gpse https://${GITHUB_TOKEN}@github.com/lisihang1401443109/GT_PE.git GT_PE
          cd GT_PE/Benchmarking-PEs

          # Setup env
          bash setup_environment.sh
          source /opt/conda/etc/profile.d/conda.sh
          conda activate GTPE

          # Link datasets and pretrained
          mkdir -p datasets
          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/ || true
          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained . || true

          # Link results to PVC
          RESULTS_DIR="/mnt/pvc/GT_PE/Benchmarking-PEs/peptides_struct_lr_sweep_results"
          mkdir -p "$RESULTS_DIR"
          rm -rf results && ln -snf "$RESULTS_DIR" results

          echo "=== Environment ready. Pod is alive for debugging ==="
          echo "To exec in: kubectl exec -it grit-debug-pod -n gp-engine-malof -- /bin/bash"
          sleep infinity
      env:
        - name: WANDB_API_KEY
          valueFrom: { secretKeyRef: { name: wandb-api-key, key: WANDB_API_KEY } }
        - name: GITHUB_TOKEN
          valueFrom: { secretKeyRef: { name: github-token, key: token } }
      resources:
        limits: { nvidia.com/gpu: "1", memory: "128Gi", cpu: "8", ephemeral-storage: "100Gi" }
        requests: { nvidia.com/gpu: "1", memory: "128Gi", cpu: "8", ephemeral-storage: "50Gi" }
      volumeMounts:
        - name: data-volume
          mountPath: "/mnt/pvc"
        - name: dshm
          mountPath: "/dev/shm"
  volumes:
    - name: data-volume
      persistentVolumeClaim: { claimName: sihang-test-pvc }
    - name: dshm
      emptyDir: { medium: Memory }
  restartPolicy: Never
  tolerations:
    - {
        key: "nautilus.io/gp-engine-malof",
        operator: "Exists",
        effect: "NoSchedule",
      }
    - { key: "nvidia.com/gpu", operator: "Exists", effect: "PreferNoSchedule" }
