apiVersion: v1
kind: Pod
metadata:
  name: gt-pe-setup-pod
spec:
  containers:
    - name: setup-container
      image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
      command: ["/bin/sleep", "infinity"]
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: 16Gi
          cpu: 4
        requests:
          nvidia.com/gpu: 1
          memory: 8Gi
          cpu: 2
      volumeMounts:
        - name: data-volume
          mountPath: /home/lisihang
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: sihang-test-pvc
  restartPolicy: Never
