apiVersion: batch/v1
kind: Job
metadata:
  name: grit-benchmarks
  namespace: gp-engine-malof
spec:
  parallelism: 8
  completions: 16
  completionMode: Indexed
  template:
    spec:
      containers:
        - name: gpu-container
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          command: [ "/bin/bash", "-c" ]
          args:
            - |
              set -e
              apt-get update && apt-get install -y git
              cd ~
              rm -rf GT_PE
              git clone --branch benchmark_pe_gpse https://${GITHUB_TOKEN}@github.com/lisihang1401443109/GT_PE.git GT_PE
              cd GT_PE/Benchmarking-PEs
              bash setup_environment.sh
              source /opt/conda/etc/profile.d/conda.sh
              conda activate GTPE
              mkdir -p datasets
              ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/ || true
              ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained . || true

              # Index 0-7: ZINC, 8-15: VOC
              DATASET_IDX=$(( $JOB_COMPLETION_INDEX / 8 ))
              INNER_IDX=$(( $JOB_COMPLETION_INDEX % 8 ))

              # Inner Mapping: 0:noPE-S, 1:noPE-D, 2:RRWP-S, 3:RRWP-D, 4:RW-S, 5:RW-D, 6:GP-S, 7:GP-D
              PE_IDX=$(( $INNER_IDX / 2 ))
              IS_DENSE=$(( $INNER_IDX % 2 ))

              PES=("noPE" "RRWP" "RWSE" "GPSE")
              PE=${PES[$PE_IDX]}

              if [ $DATASET_IDX -eq 0 ]; then
                DS="zinc"
                if [ $IS_DENSE -eq 1 ]; then
                  CFG="configs/GT/0_bench/GRIT/zinc_dense/zinc-GRIT-${PE}-Dense.yaml"
                else
                  CFG="configs/GT/0_bench/GRIT/zinc_sparse/zinc-GRIT-${PE}-Sparse.yaml"
                fi
              else
                DS="voc"
                if [ $IS_DENSE -eq 1 ]; then
                  CFG="configs/GT/0_bench/GRIT/voc_dense/voc-GRIT-${PE}-Dense.yaml"
                else
                  CFG="configs/GT/0_bench/GRIT/voc_sparse/voc-GRIT-${PE}-Sparse.yaml"
                fi
              fi

              LOG_FILE="/mnt/pvc/GT_PE/Benchmarking-PEs/logs/grit_bench_${JOB_COMPLETION_INDEX}.log"

              python main.py --cfg $CFG \
                wandb.group GRIT-Sparse-Dense-Final wandb.entity sihang-personal \
                > "$LOG_FILE" 2>&1
          env:
            - name: WANDB_API_KEY
              valueFrom: { secretKeyRef: { name: wandb-api-key, key: WANDB_API_KEY } }
            - name: GITHUB_TOKEN
              valueFrom: { secretKeyRef: { name: github-token, key: token } }
          resources:
            limits: { nvidia.com/gpu: "1", memory: "32Gi", cpu: "8" }
            requests: { nvidia.com/gpu: "1", memory: "32Gi", cpu: "8" }
          volumeMounts:
            - name: data-volume
              mountPath: "/mnt/pvc"
            - name: dshm
              mountPath: "/dev/shm"
      volumes:
        - name: data-volume
          persistentVolumeClaim: { claimName: sihang-test-pvc }
        - name: dshm
          emptyDir: { medium: Memory }
      restartPolicy: Never
      tolerations:
        - {
            key: "nautilus.io/gp-engine-malof",
            operator: "Exists",
            effect: "NoSchedule",
          }
        - { key: "nvidia.com/gpu", operator: "Exists", effect: "PreferNoSchedule" }
  backoffLimit: 0
