apiVersion: v1
kind: Pod
metadata:
  name: gat-gps-test-pod
  namespace: gp-engine-malof
spec:
  containers:
    - name: test-container
      image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -e
          echo "--- Starting GAT-GPS Test Pod ---"
          apt-get update && apt-get install -y git
          cd ~
          rm -rf GT_PE
          git clone --branch benchmark_pe_gpse https://${GITHUB_TOKEN}@github.com/lisihang1401443109/GT_PE.git GT_PE
          cd GT_PE/Benchmarking-PEs
          bash setup_environment.sh
          source /opt/conda/etc/profile.d/conda.sh
          conda activate GTPE
          mkdir -p datasets
          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/ || true
          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained . || true
          echo "GAT-GPS Test Pod Ready."
          echo "Run: python main.py --cfg configs/GT/0_bench/GraphGPS/zinc/zinc-GPS-GAT.yaml"
          sleep infinity
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token
              key: token
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: WANDB_API_KEY
      resources:
        limits:
          nvidia.com/gpu: 1
          memory: 32Gi
          cpu: 8
        requests:
          nvidia.com/gpu: 1
          memory: 32Gi
          cpu: 8
      volumeMounts:
        - name: sihang-test-pvc
          mountPath: /mnt/pvc
  volumes:
    - name: sihang-test-pvc
      persistentVolumeClaim:
        claimName: sihang-test-pvc
  restartPolicy: Never
  tolerations:
    - key: "nautilus.io/gp-engine-malof"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "PreferNoSchedule"
