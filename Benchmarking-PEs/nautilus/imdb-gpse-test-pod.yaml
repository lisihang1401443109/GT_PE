apiVersion: v1
kind: Pod
metadata:
  name: imdb-gpse-test-pod
  namespace: gp-engine-malof
  labels:
    app: grit-debug
spec:
  containers:
    - name: gpu-container
      image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
      imagePullPolicy: IfNotPresent
      command: ["/bin/bash", "-c"]
      args:
        - |
          set -e
          echo "--- Starting IMDB GPSE Test Pod ---"
          apt-get update && apt-get install -y git vim htop tmux

          # Setup workspace
          cd ~
          if [ ! -d "GT_PE" ]; then
            echo "Cloning repository..."
            git clone --branch benchmark-imdb https://${GITHUB_TOKEN}@github.com/lisihang1401443109/GT_PE.git GT_PE
          fi

          cd GT_PE/Benchmarking-PEs
          bash setup_environment.sh

          # Link data
          mkdir -p datasets
          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/ || true
          ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained . || true

          echo "Test environment ready. Source /opt/conda/etc/profile.d/conda.sh and conda activate GTPE to begin."
          tail -f /dev/null
      resources:
        limits:
          nvidia.com/gpu: "1"
          memory: "32Gi"
          cpu: "8"
        requests:
          nvidia.com/gpu: "1"
          memory: "32Gi"
          cpu: "8"
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token
              key: token
        - name: WANDB_API_KEY
          valueFrom:
            secretKeyRef:
              name: wandb-api-key
              key: WANDB_API_KEY
      volumeMounts:
        - name: data-volume
          mountPath: "/mnt/pvc"
        - name: dshm
          mountPath: "/dev/shm"
  volumes:
    - name: data-volume
      persistentVolumeClaim:
        claimName: sihang-test-pvc
    - name: dshm
      emptyDir:
        medium: Memory
  restartPolicy: Never
  tolerations:
    - key: "nautilus.io/gp-engine-malof"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "PreferNoSchedule"
