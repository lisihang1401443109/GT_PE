apiVersion: batch/v1
kind: Job
metadata:
  name: peptides-func-gat-multi-pe-verify
  namespace: gp-engine-malof
  labels:
    app: grit-verify
    target: peptides-func
    type: gat-gps
spec:
  completions: 4
  parallelism: 4
  completionMode: Indexed
  template:
    metadata:
      labels:
        app: grit-verify
        target: peptides-func
        type: gat-gps
    spec:
      containers:
        - name: gpu-container
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          imagePullPolicy: IfNotPresent
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -e
              echo "--- Starting Peptides Functional GAT Multi-PE Verification Pod ---"
              apt-get update && apt-get install -y git
              cd ~
              rm -rf GT_PE
              git clone --branch benchmark_pe_gpse https://${GITHUB_TOKEN}@github.com/lisihang1401443109/GT_PE.git GT_PE
              cd GT_PE/Benchmarking-PEs
              bash setup_environment.sh
              source /opt/conda/etc/profile.d/conda.sh
              conda activate GTPE
              mkdir -p datasets
              ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/ || true
              ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained . || true
              if [ "$JOB_COMPLETION_INDEX" -eq 0 ]; then
                PE="GPSE"
                CFG="configs/GT/0_bench/GraphGPS/LRGB/peptides_func/peptides-func-GPS-GAT-GPSE.yaml"
              elif [ "$JOB_COMPLETION_INDEX" -eq 1 ]; then
                PE="LapPE"
                CFG="configs/GT/0_bench/GraphGPS/LRGB/peptides_func/peptides-func-GPS-GAT-LapPE.yaml"
              elif [ "$JOB_COMPLETION_INDEX" -eq 2 ]; then
                PE="RWSE"
                CFG="configs/GT/0_bench/GraphGPS/LRGB/peptides_func/peptides-func-GPS-GAT-RWSE.yaml"
              elif [ "$JOB_COMPLETION_INDEX" -eq 3 ]; then
                PE="noPE"
                CFG="configs/GT/0_bench/GraphGPS/LRGB/peptides_func/peptides-func-GPS-GAT-noPE.yaml"
              fi
              WANDB_NAME="Verify-Peptides-Func-GAT-$PE"
              EXTRA_ARGS="wandb.entity sihang-personal wandb.use True wandb.name $WANDB_NAME"
              if [ "$PE" == "GPSE" ]; then
                EXTRA_ARGS="$EXTRA_ARGS posenc_GPSE.model_dir /root/GT_PE/Benchmarking-PEs/pretrained/gpse_model_molpcba_1.0.pt"
              fi
              LOG_DIR="/mnt/pvc/GT_PE/Benchmarking-PEs/logs"
              mkdir -p "$LOG_DIR"
              python main.py --cfg "$CFG" --repeat 1 $EXTRA_ARGS > "$LOG_DIR/verify_peptides_func_gat_${PE}.log" 2>&1
          env:
            - name: WANDB_API_KEY
              valueFrom:
                { secretKeyRef: { name: wandb-api-key, key: WANDB_API_KEY } }
            - name: GITHUB_TOKEN
              valueFrom: { secretKeyRef: { name: github-token, key: token } }
          resources:
            limits: { nvidia.com/gpu: "1", memory: "32Gi", cpu: "8" }
            requests: { nvidia.com/gpu: "1", memory: "32Gi", cpu: "8" }
          volumeMounts:
            - name: data-volume
              mountPath: "/mnt/pvc"
            - name: dshm
              mountPath: "/dev/shm"
      volumes:
        - name: data-volume
          persistentVolumeClaim: { claimName: sihang-test-pvc }
        - name: dshm
          emptyDir: { medium: Memory }
      restartPolicy: Never
      tolerations:
        - {
            key: "nautilus.io/gp-engine-malof",
            operator: "Exists",
            effect: "NoSchedule",
          }
        - {
            key: "nvidia.com/gpu",
            operator: "Exists",
            effect: "PreferNoSchedule",
          }
  backoffLimit: 0
