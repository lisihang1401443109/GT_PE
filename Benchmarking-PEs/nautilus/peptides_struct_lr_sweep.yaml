apiVersion: batch/v1
kind: Job
metadata:
  name: grit-peptides-struct-lr-sweep
  namespace: gp-engine-malof
  labels:
    app: grit-verify
    target: peptides-struct
    type: lr-sweep
spec:
  completions: 12
  parallelism: 6
  completionMode: Indexed
  template:
    metadata:
      labels:
        app: grit-verify
        target: peptides-struct
        type: lr-sweep
    spec:
      restartPolicy: Never
      priorityClassName: nice
      containers:
        - name: gpu-container
          image: pytorch/pytorch:2.3.0-cuda12.1-cudnn8-runtime
          imagePullPolicy: IfNotPresent
          command: [ "/bin/bash", "-c" ]
          args:
            - |
              set -e
              PE_TYPES=("noPE" "LapPE" "RWSE" "GPSE")
              LR_TYPES=("0.0001" "0.001" "0.005")

              PE_IDX=$((JOB_COMPLETION_INDEX / 3))
              LR_IDX=$((JOB_COMPLETION_INDEX % 3))

              PE=${PE_TYPES[$PE_IDX]}
              LR=${LR_TYPES[$LR_IDX]}

              echo "--- Starting Peptides-Struct LR Sweep: $PE | LR: $LR ---"

              # Install git
              apt-get update && apt-get install -y git

              # Setup workspace
              cd ~
              rm -rf GT_PE
              git clone --branch benchmark_pe_gpse https://${GITHUB_TOKEN}@github.com/lisihang1401443109/GT_PE.git GT_PE
              cd GT_PE/Benchmarking-PEs

              git clean -fd
              git reset --hard origin/benchmark_pe_gpse

              bash setup_environment.sh
              source /opt/conda/etc/profile.d/conda.sh
              conda activate GTPE

              mkdir -p datasets
              ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/datasets/* datasets/ || true
              ln -snf /mnt/pvc/GT_PE/Benchmarking-PEs/pretrained . || true

              RESULTS_DIR="/mnt/pvc/GT_PE/Benchmarking-PEs/peptides_struct_lr_sweep_results"
              mkdir -p "$RESULTS_DIR"
              rm -rf results && ln -snf "$RESULTS_DIR" results

              CONFIG="configs/GT/0_bench/Peptides_Struct_LR_Sweep/peptides_struct-GRIT-${PE}-LR-${LR}.yaml"
              WANDB_NAME="Peptides-Struct-GRIT-${PE}-LR-${LR}-Sparse"

              python main.py --cfg "${CONFIG}" --repeat 1 wandb.use True wandb.name "${WANDB_NAME}"
              echo "--- Completed $PE | $LR ---"
          env:
            - name: WANDB_API_KEY
              valueFrom: { secretKeyRef: { name: wandb-api-key, key: WANDB_API_KEY } }
            - name: GITHUB_TOKEN
              valueFrom: { secretKeyRef: { name: github-token, key: token } }
          resources:
            limits: { nvidia.com/gpu: "1", memory: "32Gi", cpu: "4", ephemeral-storage: "100Gi" }
            requests: { nvidia.com/gpu: "1", memory: "32Gi", cpu: "4", ephemeral-storage: "50Gi" }
          volumeMounts:
            - name: data-volume
              mountPath: "/mnt/pvc"
            - name: dshm
              mountPath: "/dev/shm"
      volumes:
        - name: data-volume
          persistentVolumeClaim: { claimName: sihang-test-pvc }
        - name: dshm
          emptyDir: { medium: Memory }
      tolerations:
        - {
            key: "nautilus.io/gp-engine-malof",
            operator: "Exists",
            effect: "NoSchedule",
          }
        - { key: "nvidia.com/gpu", operator: "Exists", effect: "PreferNoSchedule" }
  backoffLimit: 0
