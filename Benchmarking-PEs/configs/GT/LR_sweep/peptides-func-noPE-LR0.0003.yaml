accelerator: cuda:0
dataset:
  edge_encoder: true
  edge_encoder_bn: false
  edge_encoder_name: Bond
  format: OGB
  name: peptides-functional
  node_encoder: true
  node_encoder_bn: false
  node_encoder_name: Atom
  task: graph
  task_type: classification_multilabel
  transductive: false
gnn:
  act: relu
  batchnorm: true
  dim_inner: 96
  dropout: 0.0
  head: default
  layers_post_mp: 1
  layers_pre_mp: 0
gt:
  attn:
    O_e: true
    act: relu
    clamp: 5.0
    edge_enhance: false
    full_attn: true
    fwl: false
    norm_e: true
    signed_sqrt: true
  attn_dropout: 0.5
  batch_norm: true
  dim_hidden: 96
  dropout: 0.0
  layer_norm: false
  layer_type: GritTransformer
  layers: 4
  n_heads: 4
  sparse: false
metric_best: ap
mlflow:
  name: peptides-func-GRIT-noPE
  project: Exp
  use: false
model:
  graph_pooling: mean
  loss_fun: cross_entropy
  type: GritTransformer
optim:
  base_lr: 0.0003
  clip_grad_norm: true
  max_epoch: 200
  num_warmup_epochs: 10
  optimizer: adamW
  scheduler: cosine_with_warmup
  weight_decay: 0.0
out_dir: results/LR_sweep
pad_to_full_graph: true
posenc_RRWP:
  add_identity: true
  add_node_attr: false
  enable: false
  ksteps: 17
train:
  batch_size: 16
  ckpt_period: 100
  eval_period: 1
  mode: custom
wandb:
  entity: jiaqing
  group: LR-Sweep-Grit-All
  name: peptides-func-noPE-LR0.0003
  project: PEGT
  use: true
