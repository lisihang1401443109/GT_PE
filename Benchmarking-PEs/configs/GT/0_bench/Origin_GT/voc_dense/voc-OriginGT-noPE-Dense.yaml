dataset:
  edge_encoder: true
  edge_encoder_bn: false
  edge_encoder_name: VOCEdge
  format: PyG-VOCSuperpixels
  name: edge_wt_region_boundary
  node_encoder: true
  node_encoder_bn: false
  node_encoder_name: VOCNode
  slic_compactness: 30
  task: graph
  task_type: classification
  transductive: false
gnn:
  act: gelu
  agg: mean
  batchnorm: true
  dim_inner: 64
  dropout: 0.1
  head: inductive_node
  layers_post_mp: 2
  layers_pre_mp: 0
  normalize_adj: false
gt:
  batch_norm: true
  dim_hidden: 64
  dropout: 0.0
  full_graph: true
  gamma: 1.0e-05
  layer_norm: false
  layer_type: origin_gt
  layers: 10
  n_heads: 8
metric_best: f1
mlflow:
  name: voc-OriginGT-noPE-Dense
model:
  loss_fun: weighted_cross_entropy
  type: origin_gt
optim:
  base_lr: 0.001
  clip_grad_norm: true
  max_epoch: 100
  num_warmup_epochs: 10
  optimizer: adamW
  scheduler: cosine_with_warmup
  weight_decay: 0.0
out_dir: results
posenc_LapPE:
  dim_pe: 16
  eigen:
    eigvec_norm: L2
    laplacian_norm: none
    max_freqs: 10
  enable: false
  layers: 2
  model: DeepSet
  raw_norm_type: none
repeat: 1
train:
  batch_size: 50
  ckpt_period: 100
  eval_period: 1
  mode: custom
wandb:
  name: VOC-OriginGT-noPE-Dense
