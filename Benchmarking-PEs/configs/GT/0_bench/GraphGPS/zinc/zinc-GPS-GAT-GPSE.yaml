out_dir: results
metric_best: mae
metric_agg: argmin
tensorboard_each_run: True
accelerator: "cuda:0"
num_workers: 4
wandb:
  use: True
  project: "PEGT"
  name: "ZINC-GraphGPS-GAT-GPSE"
  entity: sihang-personal
dataset:
  format: PyG-ZINC
  name: subset
  task: graph
  task_type: regression
  transductive: False
  node_encoder: True
  node_encoder_name: TypeDictNode+GPSE
  node_encoder_num_types: 28
  node_encoder_bn: False
  edge_encoder: True
  edge_encoder_name: TypeDictEdge
  edge_encoder_num_types: 4
  edge_encoder_bn: False
posenc_GPSE:
  enable: True
  rand_type: NormalSE
  model_dir: /root/GT_PE/Benchmarking-PEs/pretrained/gpse_model_molpcba_1.0.pt
  dim_pe: 32
  use_repr: True
  repr_type: no_post_mp
  model: mlp
  layers: 2
  virtual_node: True
  input_dropout_be: 0.5
  input_dropout_ae: 0.0
  raw_norm_type: BatchNorm
  gnn_cfg:
    head: inductive_hybrid_multi
    layers_pre_mp: 1
    layers_mp: 20
    layers_post_mp: 2
    dim_inner: 512
    layer_type: resgatedgcnconv
    multi_head_dim_inner: 32
    stage_type: skipsum
    batchnorm: True
    act: relu
    dropout: 0.2
    agg: mean
    normalize_adj: False
train:
  mode: custom
  batch_size: 128
  eval_period: 1
  enable_ckpt: True
  ckpt_best: True
  ckpt_clean: True
model:
  type: GPSModel
  loss_fun: l1
  edge_decoding: dot
  graph_pooling: add
gt:
  layer_type: GAT+None
  layers: 10
  n_heads: 4
  dim_hidden: 64
  dropout: 0.1
  layer_norm: False
  batch_norm: True
  update_e: True
  attn_dropout: 0.1
  attn:
    clamp: 5.
    act: "relu"
    full_attn: False
    edge_enhance: True
    O_e: True
    norm_e: True
    fwl: False
gnn:
  head: san_graph
  layers_pre_mp: 0
  layers_post_mp: 3
  dim_inner: 64
  batchnorm: True
  act: relu
  dropout: 0.0
  agg: mean
  normalize_adj: False
optim:
  clip_grad_norm: True
  optimizer: adamW
  weight_decay: 1e-5
  base_lr: 1e-3
  max_epoch: 750
  num_warmup_epochs: 50
  scheduler: cosine_with_warmup
  min_lr: 1e-6
