accelerator: cuda:0
dataset:
  edge_encoder: true
  edge_encoder_bn: false
  edge_encoder_name: Bond
  format: OGB
  name: peptides-functional
  node_encoder: true
  node_encoder_bn: false
  node_encoder_name: Atom+RWSE
  task: graph
  task_type: classification_multilabel
  transductive: false
gnn:
  act: relu
  batchnorm: true
  dim_inner: 96
  dropout: 0.0
  head: default
  layers_post_mp: 1
  layers_pre_mp: 0
gt:
  attn:
    O_e: true
    act: relu
    clamp: 5.0
    edge_enhance: false
    full_attn: false
    fwl: false
    norm_e: true
    signed_sqrt: true
  attn_dropout: 0.5
  batch_norm: true
  dim_hidden: 96
  dropout: 0.0
  layer_norm: false
  layer_type: GritTransformer
  layers: 4
  n_heads: 4
  sparse: true
metric_best: ap
mlflow:
  name: peptides-func-GRIT-RWSE
  project: Exp
  use: false
model:
  graph_pooling: mean
  loss_fun: cross_entropy
  type: GritTransformer
optim:
  base_lr: 0.0003
  clip_grad_norm: true
  max_epoch: 200
  num_warmup_epochs: 10
  optimizer: adamW
  scheduler: cosine_with_warmup
  weight_decay: 0.0
out_dir: results
pad_to_full_graph: true
posenc_RWSE:
  dim_pe: 17
  enable: true
  kernel:
    times_func: range(1,21)
  model: Linear
  raw_norm_type: BatchNorm
train:
  batch_size: 16
  ckpt_period: 100
  eval_period: 1
  mode: custom
wandb:
  entity: sihang-personal
  group: GRIT-Sparse-Dense-Final
  name: PEPTIDES_FUNC-GRIT-RWSE-Sparse
  project: PEGT
  use: true
