dataset:
  edge_encoder: true
  edge_encoder_bn: false
  edge_encoder_name: Bond
  format: OGB
  name: ogbg-molpcba
  node_encoder: true
  node_encoder_bn: false
  node_encoder_name: Atom+GPSE
  task: graph
  task_type: classification_multilabel
  transductive: false
gnn:
  act: relu
  agg: mean
  batchnorm: true
  dim_inner: 128
  dropout: 0.0
  head: graph
  layers_post_mp: 1
  layers_pre_mp: 0
  normalize_adj: false
gt:
  attn:
    O_e: true
    act: relu
    clamp: 5.0
    edge_enhance: true
    full_attn: false
    fwl: false
    norm_e: true
  attn_dropout: 0.5
  batch_norm: true
  dim_hidden: 128
  dropout: 0.2
  layer_norm: false
  layer_type: GritTransformer
  layers: 5
  n_heads: 8
  sparse: false
metric_best: ap
model:
  edge_decoding: dot
  graph_pooling: mean
  loss_fun: cross_entropy
  type: GritTransformer
optim:
  base_lr: 0.0005
  clip_grad_norm: true
  max_epoch: 100
  num_warmup_epochs: 5
  optimizer: adamW
  scheduler: cosine_with_warmup
  weight_decay: 1.0e-05
out_dir: results
posenc_GPSE:
  dim_pe: 32
  use_repr: true
  repr_type: no_post_mp
  model: mlp
  layers: 2
  virtual_node: true
  input_dropout_be: 0.5
  input_dropout_ae: 0.0
  enable: true
  model_dir: /root/GT_PE/Benchmarking-PEs/pretrained/gpse_model_molpcba_1.0.pt
  raw_norm_type: BatchNorm
  gnn_cfg:
    head: inductive_hybrid_multi
    layers_pre_mp: 1
    layers_mp: 20
    layers_post_mp: 2
    dim_inner: 512
    layer_type: resgatedgcnconv
    multi_head_dim_inner: 32  # use dim_inner if None
    stage_type: skipsum
    batchnorm: true
    act: relu
    dropout: 0.2
    agg: mean
    normalize_adj: false
train:
  batch_size: 512
  ckpt_period: 100
  eval_period: 1
  mode: custom
wandb:
  entity: sihang-personal
  name: MolPCBA-GRIT-GPSE-Dense
  project: PEGT
  use: true
