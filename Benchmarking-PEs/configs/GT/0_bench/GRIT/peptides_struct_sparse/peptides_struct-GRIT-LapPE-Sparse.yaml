accelerator: cuda:0
dataset:
  edge_encoder: true
  edge_encoder_bn: false
  edge_encoder_name: Bond
  format: OGB
  name: peptides-structural
  node_encoder: true
  node_encoder_bn: false
  node_encoder_name: Atom+LapPE
  task: graph
  task_type: regression
  transductive: false
gnn:
  act: relu
  batchnorm: true
  dim_inner: 96
  dropout: 0.0
  head: default
  layers_post_mp: 2
  layers_pre_mp: 0
gt:
  attn:
    O_e: true
    act: relu
    clamp: 5.0
    edge_enhance: false
    full_attn: false
    norm_e: true
    signed_sqrt: true
  attn_dropout: 0.2
  batch_norm: true
  dim_hidden: 96
  dropout: 0.05
  layer_norm: false
  layer_type: GritTransformer
  layers: 4
  n_heads: 8
  sparse: true
metric_agg: argmin
metric_best: mae
mlflow:
  name: peptides-struct-GRIT-LapPE
  project: Exp
  use: false
model:
  graph_pooling: mean
  loss_fun: l1
  type: GritTransformer
optim:
  base_lr: 0.0003
  clip_grad_norm: true
  max_epoch: 200
  num_warmup_epochs: 10
  optimizer: adamW
  scheduler: cosine_with_warmup
  weight_decay: 0.0
out_dir: results
posenc_LapPE:
  dim_pe: 24
  eigen:
    eigvec_norm: L2
    laplacian_norm: none
    max_freqs: 24
  enable: true
  layers: 2
  model: DeepSet
  raw_norm_type: none
train:
  batch_size: 16
  ckpt_period: 100
  eval_period: 1
  mode: custom
wandb:
  entity: sihang-personal
  group: GRIT-Sparse-Dense-Final
  name: PEPTIDES_STRUCT-GRIT-LapPE-Sparse
  project: PEGT
  use: true
