accelerator: cuda:0
dataset:
  edge_encoder: true
  edge_encoder_bn: false
  edge_encoder_name: DummyEdge
  format: PyG-GNNBenchmarkDataset
  name: PATTERN
  node_encoder: true
  node_encoder_bn: false
  node_encoder_name: LinearNode
  split_mode: standard
  task: graph
  task_type: classification
  transductive: false
gnn:
  act: relu
  agg: mean
  batchnorm: true
  dim_edge: 64
  dim_inner: 64
  dropout: 0.0
  head: inductive_node
  layers_post_mp: 3
  layers_pre_mp: 0
  normalize_adj: false
gt:
  attn:
    O_e: true
    act: relu
    clamp: 5.0
    edge_enhance: true
    full_attn: false
    fwl: false
    norm_e: true
  attn_dropout: 0.2
  batch_norm: true
  dim_hidden: 64
  dropout: 0.0
  layer_norm: false
  layer_type: GritTransformer
  layers: 10
  n_heads: 8
  sparse: true
metric_best: accuracy-SBM
model:
  edge_decoding: dot
  loss_fun: weighted_cross_entropy
  type: GritTransformer
optim:
  base_lr: 0.0005
  clip_grad_norm: true
  max_epoch: 100
  num_warmup_epochs: 5
  optimizer: adamW
  scheduler: cosine_with_warmup
  weight_decay: 1.0e-05
out_dir: results
train:
  batch_size: 32
  ckpt_period: 100
  eval_period: 1
  mode: custom
wandb:
  entity: sihang-personal
  name: PATTERN-GRIT-noPE-Sparse
  project: PEGT
  use: true
