accelerator: cuda:0
dataset:
  edge_encoder: true
  edge_encoder_bn: false
  edge_encoder_name: Bond
  format: OGB
  name: peptides-functional
  node_encoder: true
  node_encoder_bn: false
  node_encoder_name: LinearNode+GPSE
  task: graph
  task_type: classification_multilabel
  transductive: false
gnn:
  act: relu
  batchnorm: true
  dim_inner: 96
  dropout: 0.0
  head: default
  layers_post_mp: 1
  layers_pre_mp: 0
gt:
  attn:
    O_e: true
    act: relu
    clamp: 5.0
    edge_enhance: false
    full_attn: true
    fwl: false
    norm_e: true
    signed_sqrt: true
  attn_dropout: 0.5
  batch_norm: true
  dim_hidden: 96
  dropout: 0.0
  layer_norm: false
  layer_type: GritTransformer
  layers: 4
  n_heads: 4
  sparse: false
metric_best: ap
mlflow:
  name: peptides-func-GRIT-noPE
  project: Exp
  use: false
model:
  graph_pooling: mean
  loss_fun: cross_entropy
  type: GritTransformer
optim:
  base_lr: 0.0003
  clip_grad_norm: true
  max_epoch: 200
  num_warmup_epochs: 10
  optimizer: adamW
  scheduler: cosine_with_warmup
  weight_decay: 0.0
out_dir: results
pad_to_full_graph: true
posenc_GPSE:
  enable: true
  rand_type: NormalSE
  model_dir: /root/GT_PE/Benchmarking-PEs/pretrained/gpse_model_molpcba_1.0.pt
  dim_pe: 32
  use_repr: true
  repr_type: no_post_mp
  model: mlp
  layers: 2
  virtual_node: true
  input_dropout_be: 0.5
  input_dropout_ae: 0.0
  raw_norm_type: BatchNorm
  gnn_cfg:
    head: inductive_hybrid_multi
    layers_pre_mp: 1
    layers_mp: 20
    layers_post_mp: 2
    dim_inner: 512
    layer_type: resgatedgcnconv
    multi_head_dim_inner: 32  # use dim_inner if None
    stage_type: skipsum
    batchnorm: true
    act: relu
    dropout: 0.2
    agg: mean
    normalize_adj: false
posenc_LapPE:
  enable: false
posenc_RRWP:
  add_identity: true
  add_node_attr: false
  enable: false
  ksteps: 17
posenc_RWSE:
  enable: false
train:
  batch_size: 16
  ckpt_period: 100
  eval_period: 1
  mode: custom
wandb:
  entity: jiaqing
  name: PEPTIDES_FUNC-GRIT-GPSE-Dense
  project: PEGT
  use: true
