accelerator: cuda:0
dataset:
  edge_encoder: true
  edge_encoder_bn: false
  edge_encoder_name: LinearEdge
  format: PyG-PeptidesStructuralDataset
  name: peptides-structural
  node_encoder: true
  node_encoder_bn: false
  node_encoder_name: LinearNode+LapPE
  task: graph
  task_type: regression
  transductive: false
gnn:
  act: relu
  agg: mean
  batchnorm: true
  dim_edge: 64
  dim_inner: 64
  dropout: 0.0
  head: san_graph
  layers_post_mp: 3
  layers_pre_mp: 0
  normalize_adj: false
gt:
  attn:
    O_e: true
    act: relu
    clamp: 5.0
    edge_enhance: true
    full_attn: false
    fwl: false
    norm_e: true
  attn_dropout: 0.2
  batch_norm: true
  dim_hidden: 64
  dropout: 0.0
  layer_norm: false
  layer_type: GritTransformer
  layers: 10
  n_heads: 8
  sparse: true
metric_agg: argmin
metric_best: mae
model:
  edge_decoding: dot
  graph_pooling: mean
  loss_fun: l1
  type: GritTransformer
optim:
  base_lr: 0.0001
  clip_grad_norm: true
  max_epoch: 300
  num_warmup_epochs: 5
  optimizer: adamW
  scheduler: cosine_with_warmup
  weight_decay: 1.0e-05
out_dir: results
posenc_LapPE:
  dim_pe: 16
  eigen:
    eigvec_norm: L2
    laplacian_norm: sym
    max_freqs: 10
  enable: true
  layers: 3
  model: DeepSet
  raw_norm_type: none
train:
  batch_size: 32
  ckpt_period: 100
  eval_period: 1
  mode: custom
wandb:
  entity: sihang-personal
  name: Peptides-Struct-GRIT-LapPE-LR-0.0001-Sparse
  project: PEGT
  use: true
